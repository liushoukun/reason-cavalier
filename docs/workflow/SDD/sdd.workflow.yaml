# 与 docs/workflow/SDD.md 对齐；术语与 docs/workflow/concepts.md、workflow-definition.md 一致
id: sdd
version: "1.4.0"
name: SDD 工作流
description: >-
  以可验证的需求为单一事实来源，按 stage 推进：需求（Spec）→ 方案（Plan）→ 实现（Implement）
  → 验证（Verify）→ 完结（Complete）。每段具备 inputs、outputs、agents、steps；主链路 transitions
  与需求变更 exception 见文末。人读说明见 documentation。
methodology: sdd
documentation: docs/workflow/SDD.md

stages:
  - id: spec
    key: Spec
    title: 需求阶段
    purpose: 把「要做什么、做到什么算对」写清楚，避免实现期反复猜意图。
    inputs:
      - 业务问题或机会、干系人给出的初始目标与约束（可口头/工单/纪要）
      - 已知非目标或排除范围（若有）
    outputs:
      - 问题与目标（背景、非目标）
      - 用户/系统行为与边界条件
      - 验收标准（可逐条勾选）
      - 接口/数据/错误语义（若涉及）
    agents:
      - id: requirements-analyst
        role: lead
        notes: 需求澄清与产出主编排
    steps:
      - id: align-problem-scope
        title: 对齐问题、目标与非目标
        summary: 与干系人收敛范围，减少下游返工
      - id: define-acceptance
        title: 定义可测的验收标准
        outputs:
          - 验收标准列表（与需求条目可追溯）
    exit_criteria: 验收标准可测试、无关键歧义；干系人对范围达成一致。

  - id: plan
    key: Plan
    title: 方案阶段
    purpose: >-
      在已批准需求约束下分解任务、识别风险与依赖，确定实现顺序；并预先约定如何验证，
      避免实现结束才补测试思路。
    inputs:
      - 已批准或可追踪变更的需求产出（Spec 段 outputs）
    outputs:
      - 任务拆解与优先级
      - 技术方案要点（与需求的对应关系）
      - >-
        测试方案（或测试计划）：范围；测试类型与分层；场景与用例与验收标准映射；
        数据与环境；执行与门禁
      - 风险与回滚/兼容策略（如需要）
    agents:
      - id: system-architect
        role: lead
        notes: 架构与方案主编排
      - id: qa-engineer
        role: participant
        notes: 协同定义测试方案与验收映射
    steps:
      - id: task-breakdown
        title: 任务拆解与依赖排序
        agents: [system-architect]
      - id: test-plan-and-trace
        title: 测试方案与验收标准映射
        summary: 保证后续 Verify 可按方案执行
        agents: [qa-engineer, system-architect]
        outputs:
          - 已定稿的测试方案与追溯矩阵（或等价列表）
    exit_criteria: >-
      每项任务可映射到需求条目；测试方案已覆盖全部验收标准且无未决缺口；
      无未解决的阻塞依赖。

  - id: implement
    key: Implement
    title: 实现阶段
    purpose: 按方案交付代码与配置，变更范围受已批准需求约束。
    inputs:
      - 已批准需求与已定稿方案（含任务顺序）
      - 团队仓库约定与分支策略（若有）
    outputs:
      - 满足方案的代码与配置变更
      - 可构建、可自检的提交历史（小步为佳）
    agents:
      - id: software-engineer
        role: lead
    principles:
      - 实现仅覆盖已批准需求；需求变更应回到需求阶段（Spec）或方案阶段（Plan）修订后再继续
      - 小步提交，保持可审查、可回滚
    steps:
      - id: implement-changes
        title: 编码与配置实现
      - id: local-build-and-lint
        title: 本地构建与规范自检
        outputs:
          - 通过本地构建的变更集
    exit_criteria: 本地构建通过；自检与代码规范满足团队约定。

  - id: verify
    key: Verify
    title: 验证阶段
    purpose: 证明实现满足需求与验收标准，而非「感觉能跑」。
    inputs:
      - 构建通过的可测产物
      - 方案阶段已定稿的测试方案
      - 需求中的验收标准条目
    outputs:
      - 测试执行记录与结果（自动 + 必要的手动）
      - 已知限制与例外说明（若有）
    agents:
      - id: qa-engineer
        role: lead
        notes: 测试方案执行与结果主编排
      - id: code-reviewer
        role: participant
      - id: security-auditor
        role: participant
    steps:
      - id: run-test-plan
        title: 按测试方案执行（自动 + 必要手动）
        summary: 实现落地后可细化用例与数据
        agents: [qa-engineer]
        outputs:
          - 与验收标准逐条对照的结果
      - id: parallel-review
        title: 代码质量与安全并行审查
        summary: 与 plan.md 开发后并行审查一致；可与上一步迭代直至出口
        agents: [code-reviewer, security-auditor]
      - id: regression-and-known-limits
        title: 回归与已知限制评估
        summary: 回归相关路径；记录已知限制并评估是否可接受
        agents: [qa-engineer]
    exit_criteria: 验收标准全部满足，或经明确签字/记录接受的例外。

  - id: complete
    key: Complete
    title: 完结阶段
    purpose: >-
      SDD 主链末段（Verify→Complete）：在验证已通过后，对需求作最终规约与定稿，
      将 Spec/Plan/Implement/Verify 各段约定产出合并整理入知识库，并完成仓库与发布收口。
    inputs:
      # 与 SDD.md 中「上游 stage → Complete」表一致；应对齐各 stage 的 outputs
      - "Verify：验证通过记录或已批准例外；测试执行与审查结论；已知限制说明（若有）"
      - "Spec：本周期需求与验收条文（规约底稿）"
      - "Plan：已定稿方案、任务拆解、测试方案及与验收的映射"
      - "Implement：变更集说明、与需求/方案对照的实作差异（若有）"
      - 待合并分支或发布清单（若适用）
      - 团队知识库形态与入库规范（RAG/文档库/Wiki 等约定）
    outputs:
      - 需求规约/定稿（与 Spec 验收、Verify 结论、实作差异一致，可作下一周期基线）
      - 知识库更新（去重分类建链；可指回本任务在 SDD 链路上的各段产出）
      - 变更说明（行为、配置、迁移），与 Implement 交付对齐
      - 后续事项（技术债、监控项）列表（可选）
    agents:
      - id: requirements-analyst
        role: lead
        notes: 需求规约与知识库业务内容主编排
      - id: system-architect
        role: participant
        notes: 方案/架构与测试方案要点结构化入库
      - id: software-engineer
        role: participant
        notes: 代码分支合并与仓库对齐
      - id: qa-engineer
        role: participant
        notes: 可选；验证证据摘要入知识库
    steps:
      - id: finalize-requirement-norms
        title: 需求规约与定稿
        summary: 以 Verify 为约束，对 Spec 需求与验收定稿，吸收例外及 Implement 相对 Plan 的差异
        agents: [requirements-analyst]
        inputs:
          - Verify 结论与 Spec/Plan 条文
        outputs:
          - 需求规约/定稿文档或等价物
      - id: merge-organize-knowledge-base
        title: 合并整理并写入知识库
        summary: 汇总 Spec/Plan/Implement/Verify 相关材料，去重分类建链后按规范入库
        agents: [requirements-analyst, system-architect]
        inputs:
          - 各上游 stage 的约定产出与可追溯引用（任务 id、分支、文档路径等）
        outputs:
          - 知识库条目或索引更新记录
      - id: repo-merge-and-release
        title: 仓库与发布收口
        summary: 变更说明与代码/文档对齐，合并或发布决策
        agents: [software-engineer]
        outputs:
          - 变更说明；仓库与发布流程闭环
    exit_criteria: >-
      需求规约已定稿且可追溯至 Spec 与 Verify；知识库整理已覆盖上游各段关键产出；
      文档与代码仓库状态一致；发布或合并流程结束。

transitions:
  - from_key: Spec
    to_key: Plan
    gate: 验收标准齐备、范围冻结或可追踪变更
  - from_key: Plan
    to_key: Implement
    gate: 任务与需求可追溯；测试方案已定稿；阻塞已处理
  - from_key: Implement
    to_key: Verify
    gate: 构建与自检通过
  - from_key: Verify
    to_key: Complete
    gate: 验收通过或例外已批准；需求规约已定稿；知识库合并整理与入库已完成

exceptions:
  - id: requirement-change
    from_key: "*"
    to_key: Spec
    condition: 需求变更
    notes: 回到需求阶段（Spec），再向下游同步

# 与 docs/plan.md §4 对应：Agent 拓扑（调谁）；与 stages 的交付/门禁互补
agent_pipeline:
  main_chain:
    - requirements-analyst
    - system-architect
    - software-engineer
    - qa-engineer
  parallel_after:
    software-engineer:
      - code-reviewer
      - security-auditor
  notes:
    - 默认主链路：需求 -> 架构 -> 开发 -> 测试
    - code-reviewer 与 security-auditor 对开发产物并行审查
    - 任一环节阻塞时，返回上游 Agent 修正后再进入下一环节
